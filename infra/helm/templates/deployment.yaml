apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-ai-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: production-ai-app
  template:
    metadata:
      labels:
        app: production-ai-app
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000

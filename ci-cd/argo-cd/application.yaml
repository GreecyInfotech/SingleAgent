apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-agent-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/enterprise-agent-platform.git
    targetRevision: main
    path: deployments/helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
